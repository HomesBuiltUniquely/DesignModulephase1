# Paste into your Nginx site for api.hubinterior.com (or include with include directive).
# Default Nginx client_max_body_size is 1m — uploads larger than ~1 MB fail or truncate (PDFs look "KB only").
# After editing: sudo nginx -t && sudo systemctl reload nginx

server {
    # listen 443 ssl http2;
    # server_name api.hubinterior.com;
    # ssl_certificate ...;

    client_max_body_size 200M;
    client_body_timeout 300s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Same limit inside location (some setups need it repeated)
        client_max_body_size 200M;
        # Large multipart uploads (DQC drawing + quotation PDFs)
        proxy_request_buffering off;
    }
}
