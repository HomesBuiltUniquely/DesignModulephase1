# Paste into your Nginx site for api.hubinterior.com (or include with include directive).
# Default Nginx client_max_body_size is 1m — uploads larger than ~1 MB fail or truncate (PDFs look "KB only").
#
# CORS: If the browser says "No Access-Control-Allow-Origin" but Node is correct, often Nginx returns
# 413/502/504 *before* the request hits Node — those responses have no CORS headers.
# Fix: add the map from nginx-http-cors-map.conf into http{}, then use the add_header lines below
# (with `always`) so error responses still tell the browser the origin is allowed.
#
# OPTIONS must reach Node OR be answered by Nginx with the same CORS headers (preflight for POST + Authorization).
#
# After editing: sudo nginx -t && sudo systemctl reload nginx

server {
    # listen 443 ssl http2;
    # server_name api.hubinterior.com;
    # ssl_certificate ...;

    client_max_body_size 200M;
    client_body_timeout 300s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass browser Origin to Node (some proxies drop it; CORS then fails)
        proxy_set_header Origin $http_origin;
        # Same limit inside location (some setups need it repeated)
        client_max_body_size 200M;
        # Large multipart uploads (DQC drawing + quotation PDFs)
        proxy_request_buffering off;
    }
}
